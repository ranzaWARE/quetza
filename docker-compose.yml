version: '3.8'

services:

  quetza:
    build: https://github.com/ranzaWARE/quetza.git#main:backend
    container_name: quetza
    restart: unless-stopped
    ports:
      - "8080:3000"
      - "8443:3443"
    volumes:
      - quetza_data:/app/data
      - quetza_certs:/app/certs
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/quetza.db
      - SESSION_SECRET=${SESSION_SECRET}
      - SERVER_IP=${SERVER_IP:-127.0.0.1}
      - LDAP_ENABLED=${LDAP_ENABLED:-false}
      - LDAP_URL=${LDAP_URL:-ldap://192.168.1.10:389}
      - LDAP_BIND_DN=${LDAP_BIND_DN}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD}
      - LDAP_SEARCH_BASE=${LDAP_SEARCH_BASE:-DC=graphimecc,DC=local}
      - LDAP_SEARCH_FILTER=${LDAP_SEARCH_FILTER:-(sAMAccountName={{username}})}
      - LDAP_TLS_REJECT_UNAUTHORIZED=${LDAP_TLS_REJECT_UNAUTHORIZED:-false}
      # URL interno del servizio Whisper
      - WHISPER_URL=http://quetza-whisper:9876
    depends_on:
      quetza-whisper:
        condition: service_healthy
        required: false

  quetza-whisper:
    build:
      context: ./whisper
    container_name: quetza-whisper
    restart: unless-stopped
    # Nessuna porta esposta all'esterno — solo rete interna Docker
    volumes:
      - whisper_models:/app/models
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
      - HF_TOKEN=${HF_TOKEN:-}
      - LANGUAGE=${LANGUAGE:-it}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9876/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s   # i modelli possono richiedere tempo al primo avvio
    # Limita RAM per non soffocare il server
    deploy:
      resources:
        limits:
          memory: 6G

volumes:
  quetza_data:
  quetza_certs:
  whisper_models:    # modelli persistiti tra restart