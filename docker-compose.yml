version: '3.8'

services:

  quetza:
    build: https://github.com/ranzaWARE/quetza.git#main:backend
    container_name: quetza
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - quetza_data:/app/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/quetza.db
      - SESSION_SECRET=${SESSION_SECRET}
      - LDAP_ENABLED=${LDAP_ENABLED:-false}
      - LDAP_URL=${LDAP_URL:-ldap://192.168.1.10:389}
      - LDAP_BIND_DN=${LDAP_BIND_DN}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD}
      - LDAP_SEARCH_BASE=${LDAP_SEARCH_BASE:-DC=graphimecc,DC=local}
      - LDAP_SEARCH_FILTER=${LDAP_SEARCH_FILTER:-(sAMAccountName={{username}})}
      - LDAP_TLS_REJECT_UNAUTHORIZED=${LDAP_TLS_REJECT_UNAUTHORIZED:-false}

  nginx:
    image: nginx:alpine
    container_name: quetza-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - quetza_certs:/etc/nginx/certs
    depends_on:
      - quetza
    environment:
      - SERVER_IP=${SERVER_IP:-127.0.0.1}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache openssl
        mkdir -p /etc/nginx/certs
        if [ ! -f /etc/nginx/certs/quetza.crt ]; then
          echo 'Generating SSL certificate...'
          openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
            -keyout /etc/nginx/certs/quetza.key \
            -out    /etc/nginx/certs/quetza.crt \
            -subj   "/CN=quetza/O=Graphimecc/C=IT" \
            -addext "subjectAltName=IP:${SERVER_IP:-127.0.0.1},DNS:localhost"
        fi
        cat > /etc/nginx/conf.d/default.conf << 'NGINX'
        server {
            listen 80;
            return 301 https://$host$request_uri;
        }
        server {
            listen 443 ssl;
            ssl_certificate     /etc/nginx/certs/quetza.crt;
            ssl_certificate_key /etc/nginx/certs/quetza.key;
            ssl_protocols       TLSv1.2 TLSv1.3;
            ssl_ciphers         HIGH:!aNULL:!MD5;
            client_max_body_size 250M;
            location / {
                proxy_pass         http://quetza:3000;
                proxy_http_version 1.1;
                proxy_set_header   Host $host;
                proxy_set_header   X-Real-IP $remote_addr;
                proxy_set_header   X-Forwarded-Proto https;
                proxy_read_timeout 300s;
            }
        }
        NGINX
        exec nginx -g 'daemon off;'

volumes:
  quetza_data:
  quetza_certs: