version: '3.8'

services:
  quetza:
    build: ./backend
    container_name: quetza
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - quetza_data:/app/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/quetza.db
      - SESSION_SECRET=${SESSION_SECRET:-cambia_questa_stringa_con_qualcosa_di_lungo_e_casuale}
      # ── LDAP / Active Directory ──────────────────────────
      - LDAP_ENABLED=${LDAP_ENABLED:-false}
      - LDAP_URL=${LDAP_URL:-ldap://192.168.1.10:389}
      - LDAP_BIND_DN=${LDAP_BIND_DN:-CN=svc_quetza,OU=ServiceAccounts,DC=graphimecc,DC=local}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD:-password}
      - LDAP_SEARCH_BASE=${LDAP_SEARCH_BASE:-DC=graphimecc,DC=local}
      - LDAP_SEARCH_FILTER=${LDAP_SEARCH_FILTER:-(sAMAccountName={{username}})}
      - LDAP_TLS_REJECT_UNAUTHORIZED=${LDAP_TLS_REJECT_UNAUTHORIZED:-false}

volumes:
  quetza_data:
