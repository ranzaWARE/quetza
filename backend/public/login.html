<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quetza — Accesso</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f1923 0%,#1a2a3a 60%,#0d2137 100%)}
.card{background:#fff;border-radius:14px;padding:40px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo span{font-size:1.4rem;font-weight:800;color:#0f1923}
h1{font-size:1.4rem;font-weight:700;color:#0f1923;margin-bottom:4px}
.sub{font-size:.85rem;color:#6a7a8a;margin-bottom:26px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.8rem;font-weight:600;color:#0f1923;margin-bottom:5px}
.field input{width:100%;padding:9px 12px;border:1.5px solid #ddd;border-radius:7px;font-size:.95rem;outline:none;transition:border-color .15s}
.field input:focus{border-color:#0f1923}
.err{color:#c0392b;font-size:.82rem;padding:7px 10px;background:#fdf0f0;border-radius:5px;margin-bottom:10px;display:none}
.err.on{display:block}
button[type=submit]{width:100%;padding:11px;background:#0f1923;color:#fff;border:none;border-radius:7px;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:6px;transition:background .15s}
button[type=submit]:hover{background:#1e3040}
button[type=submit]:disabled{opacity:.6}
.hint{font-size:.72rem;color:#8888aa;margin-top:16px;text-align:center}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="36" height="36" viewBox="0 0 64 64" fill="none">
      <path d="M32 30 C22 22 6 28 2 20 C8 18 18 20 28 27Z" fill="#c0392b" opacity=".9"/>
      <path d="M32 30 C18 26 4 32 2 26 C10 22 22 24 30 30Z" fill="#c0392b" opacity=".4"/>
      <path d="M32 30 C42 22 58 28 62 20 C56 18 46 20 36 27Z" fill="#c0392b" opacity=".9"/>
      <path d="M32 30 C46 26 60 32 62 26 C54 22 42 24 34 30Z" fill="#c0392b" opacity=".4"/>
      <ellipse cx="32" cy="31" rx="5" ry="8" fill="#0f1923"/>
      <path d="M32 23 L30 16 L32 19 L34 16 Z" fill="#0f1923"/>
      <path d="M32 38 L30 46 L32 44 L34 46 Z" fill="#0f1923"/>
      <path d="M31.2 44 L32 48 L32.8 44" fill="#c0392b"/>
    </svg>
    <span>Quetza</span>
  </div>
  <h1>Accedi</h1>
  <p class="sub">Graphimecc Group</p>
  <form id="form">
    <div class="field">
      <label for="u">Username</label>
      <input type="text" id="u" autocomplete="username" placeholder="nome.cognome" required autofocus>
    </div>
    <div class="field">
      <label for="p">Password</label>
      <input type="password" id="p" autocomplete="current-password" placeholder="••••••••" required>
    </div>
    <div class="err" id="err"></div>
    <button type="submit" id="btn">Accedi</button>
  </form>
  <p class="hint">Usa le credenziali di rete aziendali</p>
</div>
<script src="/js/login.js"></script>
</body>
</html>
